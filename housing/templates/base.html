<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Housing Maintenance System{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        /* NAVBAR */
        nav {
            background: #1e293b;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: #fff;
            font-size: 20px;
        }

        nav .links a {
            color: #cbd5e1;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav .links a:hover {
            color: #38bdf8;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }

        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }

        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover { background: #16a34a; }

        /* FORM */
        form input, form select, form textarea {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }

            nav .links {
                margin-top: 10px;
            }
        }

    </style>
</head>

<body>

<nav>
    <h1>🏠 Housing System</h1>
    <div class="links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'house_list' %}">Houses</a>
        <a href="{% url 'request_list' %}">Requests</a>
        <a href="{% url 'resident_list' %}">Residents</a>

    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 Housing Maintenance System | Built with Django
</footer>

</body>
</html>
