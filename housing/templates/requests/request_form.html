{% extends 'base.html' %}

{% block content %}

<div class="card" style="max-width: 600px; margin: auto;">

```
<h2 style="margin-bottom: 20px;">
    📝 {% if view.object %}Edit{% else %}Create{% endif %} Request
</h2>

<form method="post">
    {% csrf_token %}

    <!-- TITLE -->
    <label>Title</label>
    {{ form.title }}

    <!-- DESCRIPTION -->
    <label>Description</label>
    {{ form.description }}

    <!-- STATUS -->
    <label>Status</label>
    {{ form.status }}

    <!-- CATEGORY -->
    <label>Category</label>
    {{ form.category }}

    <!-- HOUSE -->
    <label>House</label>
    {{ form.house }}

    <!-- RESIDENT -->
    <label>Resident</label>
    {{ form.resident }}

    <!-- BUTTONS -->
    <div style="margin-top: 15px;">
        <button type="submit" class="btn btn-success">Submit</button>
        <a href="{% url 'request_list' %}" class="btn btn-danger">Cancel</a>
    </div>

</form>
```

</div>

{% endblock %}
